# ===================================================================
# AI Placement Preparation System - Server Config
# ===================================================================
server.port=${PORT:8080}
server.servlet.context-path=

# ===================================================================
# Database Configuration (MySQL - Required by User)
# ===================================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/placement_prep?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
# If your MySQL has a password, set it above. Common defaults: root, admin, password, 123456.

# Optional H2 Config (To fallback to H2 in-memory, uncomment below and comment MySQL block)
# spring.datasource.url=jdbc:h2:mem:placementdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=password

# Optional PostgreSQL configuration
# spring.datasource.url=jdbc:postgresql://localhost:5432/placement_prep
# spring.datasource.driverClassName=org.postgresql.Driver
# spring.datasource.username=postgres
# spring.datasource.password=admin

# JPA / Hibernate Config
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console Configuration (Only active when H2 profile is used)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ===================================================================
# Security & JWT Configuration
# ===================================================================
# HS512 secret key base64-encoded (min 512 bits)
app.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970337336763979244226452948404D6351655468576D5A7134743777217A25432A}
app.jwt.expiration-ms=86400000

# ===================================================================
# File Upload Configuration
# ===================================================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Allow H2 frames in Security
spring.headers.frame-options.same-origin=true
