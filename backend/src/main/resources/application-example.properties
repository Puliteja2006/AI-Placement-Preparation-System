# ===================================================================
# AI Placement Preparation System - Server Config Template
# Copy this file to application.properties and supply configuration values
# ===================================================================
server.port=8080
server.servlet.context-path=

# ===================================================================
# Database Configuration (MySQL / H2 / PostgreSQL)
# ===================================================================
# Standard database credentials overrideable via environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/placement_prep?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:YOUR_DATABASE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:YOUR_DATABASE_PASSWORD}

# Optional H2 Config (Fallback to memory db)
# spring.datasource.url=jdbc:h2:mem:placementdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=password

# Optional PostgreSQL configuration
# spring.datasource.url=jdbc:postgresql://localhost:5432/placement_prep
# spring.datasource.driverClassName=org.postgresql.Driver
# spring.datasource.username=postgres
# spring.datasource.password=postgres_password

# JPA / Hibernate Config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ===================================================================
# Security & JWT Configuration
# ===================================================================
# HS512 secret key base64-encoded (min 512 bits)
app.jwt.secret=${JWT_SECRET:YOUR_SECURE_JWT_SECRET_KEY_AT_LEAST_64_CHARACTERS_LONG}
app.jwt.expiration-ms=86400000

# ===================================================================
# File Upload Configuration
# ===================================================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Security frames options
spring.headers.frame-options.same-origin=true
